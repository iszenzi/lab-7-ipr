apiVersion: v1
kind: Secret
metadata:
  name: {{ include "findyourpet.fullname" . }}-secret
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.database.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.database.password | quote }}
  POSTGRES_DB: {{ .Values.database.name | quote }}
  URL_DATABASE: {{ .Values.database.url | quote }}
  SECRET_KEY: {{ .Values.secrets.key | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  VITE_YMAPS_API_KEY: {{ .Values.secrets.ymapsKey | quote }}
  VITE_YMAPS_GEOSUGGEST_API_KEY: {{ .Values.secrets.ymapsSuggestKey | quote }}
  VITE_IMAGE_UPLOADER_API_KEY: {{ .Values.secrets.imageUploaderKey | quote }}
