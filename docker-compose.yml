services:
  database:
    image: postgres:17
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - data:/var/lib/postgresql/data
  backend:
    build: ./backend
    image: shuler7/find-your-pet-backend:1.0
    environment:
      - URL_DATABASE=${URL_DATABASE}
      - SECRET_KEY=${SECRET_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      - APP_URL=${APP_URL}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - OTEL_SERVICE_NAME=findyourpet-backend
    networks:
      - backend
      - frontend
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_YMAPS_API_KEY=${VITE_YMAPS_API_KEY}
        - VITE_YMAPS_GEOSUGGEST_API_KEY=${VITE_YMAPS_GEOSUGGEST_API_KEY}
        - VITE_IMAGE_UPLOADER_API_KEY=${VITE_IMAGE_UPLOADER_API_KEY}
        - APP_URL=${APP_URL}
    image: shuler7/find-your-pet-frontend:1.0
    networks:
      - frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    networks:
      - backend
      - frontend

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - backend
      - frontend
    depends_on:
      - prometheus

  tempo:
    image: grafana/tempo:latest
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "4317:4317"
    networks:
      - backend

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  data:
